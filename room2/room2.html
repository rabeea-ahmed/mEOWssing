<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old People's Apartment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="fade-overlay"></div>
    <div id="room-container">
        <a href="../building.html">
            <img id="back-arrow" class="clickable" src="back.png" alt="Back to Building">
        </a>

        <img id="background" src="room2.png" alt="Room Background">

        <img id="vinyl" class="clickable" src="vinyl.png" alt="Vinyl Player">
        <img id="grandma" class="clickable pulse" src="grandma-static.png" alt="Grandma reading">
        <img id="grandpa" class="clickable pulse" src="grandpa-static.png" alt="Grandpa sleeping">
    </div>

    <audio id="audio-ambience" src="room2.mp3" loop></audio>
    <audio id="audio-piano" src="Vinyl.mp3" loop></audio>
    <audio id="audio-page" src="Page flip.mp3"></audio>
    <audio id="audio-snore" src="snore.mp3"></audio>

    <script src="script.js"></script>
    <script>
    window.addEventListener("load", () => {
    const overlay = document.getElementById("fade-overlay");

    setTimeout(() => {
        overlay.classList.add("fade-out");
    }, 200); 
    });

    </script>

</body>

</html>
