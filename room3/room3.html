<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title>Owner's Apartment</title>

<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: 'Pixelify Sans', sans-serif;  

    cursor: url(../img/cursor11.png), default;

  }

  #scene {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #owner {
    position: absolute;
    height: 55vh;
    left: 50%;
    bottom: 5vh;
    transform: translateX(-50%);
    transition: 0.3s;
    z-index: 2;
  }

  #owner:hover {
    cursor: url(../img/cursor22.png), pointer;
  }

  #fade {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    font-size: 50px;
    font-weight: bold;
    transition: opacity 2s;
    z-index: 5;
  }

  #endcat {
    width: 200px;
    margin-top: 20px;
    cursor: url(../img/cursor22.png), pointer;
  }

  #restartText {
    font-size: 20px;
    margin-top: 10px;
  }


  #fade-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: black;
    z-index: 9999;

    opacity: 1;
    transition: opacity 1.5s ease;
  }

  #fade-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
  }

  @keyframes pulse {
    0% { transform: translateX(-50%) scale(1); } 
    50% { transform: translateX(-50%) scale(1.03); }
    100% { transform: translateX(-50%) scale(1); }
  }
  .pulse {
  animation: pulse 2s infinite;
  }

</style>
</head>

<body>
<div id="fade-overlay"></div>
<div id="scene">
  <img id="bg" src="ownerroom.png" alt="">
  <img id="owner" src="back2.png" class="pulse" alt="">

  <div id="fade">
    <div>you found your owner!</div>
    <img id="endcat" src="endcat.png" alt="">
    <div id="restartText">click the cat to start over</div>
  </div>
</div>

<audio id="gasp" src="gasp.mp3"></audio>
<audio id="ending" src="ending.mp3"></audio>

<script>
var owner = document.getElementById("owner");
var fade = document.getElementById("fade");
var gasp = document.getElementById("gasp");
var ending = document.getElementById("ending");
var endcat = document.getElementById("endcat");

var clicked = false;

owner.onclick = function () {
  if (clicked) {
    return;
  }

  clicked = true;
  owner.classList.remove("pulse");
  gasp.play();

  owner.src = "front22.png";

  setTimeout(function () {
    owner.src = "shocked2.png";
  }, 500);

  setTimeout(function () {
    fade.style.opacity = "0.9";
    fade.style.pointerEvents = "auto";
    ending.play();
  }, 3000);
};

endcat.onclick = function () {
window.location.href = "../index.html";
};

window.addEventListener("load", () => {
const overlay = document.getElementById("fade-overlay");

setTimeout(() => {
    overlay.classList.add("fade-out");
}, 200); 
});


</script>

</body>
</html>
